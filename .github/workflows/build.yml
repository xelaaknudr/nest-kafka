name: 🔨 CD — Build & Push Images

on:
  # Запускается только если CI прошёл успешно
  workflow_run:
    workflows:
      - "✅ CI — Lint, Typecheck & Tests"
    types: [completed]
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    # Пропускаем если CI упал
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false  # Остальные сервисы продолжают билдиться даже если один упал
      matrix:
        include:
          - service: reservation
            dockerfile: apps/reservation/Dockerfile
            image: us-east4-docker.pkg.dev/roze-501818/reservations/production

          - service: auth
            dockerfile: apps/auth/Dockerfile
            image: us-east4-docker.pkg.dev/roze-501818/auth/production

          - service: notifications
            dockerfile: apps/notifications/Dockerfile
            image: us-east4-docker.pkg.dev/roze-501818/notifications/production

          - service: payments
            dockerfile: apps/payments/Dockerfile
            image: us-east4-docker.pkg.dev/roze-501818/payments/production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          # Берём sha того коммита который прошёл CI
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🐳 Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - name: 🏗️ Build image — ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ matrix.image }}:${{ github.event.workflow_run.head_sha }} \
            -t ${{ matrix.image }}:latest \
            -f ${{ matrix.dockerfile }} \
            .

      - name: 📤 Push image — ${{ matrix.service }}
        run: |
          docker push ${{ matrix.image }}:${{ github.event.workflow_run.head_sha }}
          docker push ${{ matrix.image }}:latest
