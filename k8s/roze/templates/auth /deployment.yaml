apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth

  labels:
    app: auth


spec:

  replicas: 2


  selector:

    matchLabels:
      app: auth


  strategy:

    type: RollingUpdate


  template:

    metadata:

      labels:
        app: auth


      annotations:

        checksum/config: {{ (.Files.Get "templates/auth/configmap.yaml") | sha256sum }}

        checksum/secret: {{ (.Files.Get "templates/auth/secret.yaml") | sha256sum }}


    spec:

      imagePullSecrets:

        - name: gcr-json-key


      containers:

        - name: auth

          image: "{{ .Values.auth.image.repository }}:{{ .Values.auth.image.tag }}"

          imagePullPolicy: Always


          envFrom:

            - configMapRef:

                name: auth-config


            - secretRef:

                name: auth-secret