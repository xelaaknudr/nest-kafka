apiVersion: apps/v1
kind: Deployment

metadata:
  name: notifications
  labels:
    app: notifications
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications
  strategy:

    type: RollingUpdate


  template:


    metadata:


      labels:

        app: notifications


      annotations:

        checksum/config: {{ (.Files.Get "templates/notifications/configmap.yaml") | sha256sum }}

        checksum/secret: {{ (.Files.Get "templates/notifications/secret.yaml") | sha256sum }}


    spec:


      imagePullSecrets:


        - name: gcr-json-key


      containers:


        - name: notifications


          image: "{{ .Values.notifications.image.repository }}:{{ .Values.notifications.image.tag }}"

          imagePullPolicy: Always


          envFrom:


            - configMapRef:

                name: notifications-config


            - secretRef:

                name: notifications-secret