apiVersion: apps/v1
kind: Deployment

metadata:
  name: reservations

  labels:
    app: reservations


spec:
  replicas: 2


  selector:
    matchLabels:
      app: reservations


  strategy:
    type: RollingUpdate


  template:

    metadata:

      labels:
        app: reservations


      annotations:

        checksum/config: {{ (.Files.Get "templates/reservations/configmap.yaml") | sha256sum }}

        checksum/secret: {{ (.Files.Get "templates/reservations/secret.yaml") | sha256sum }}


    spec:

      imagePullSecrets:

        - name: gcr-json-key


      containers:

        - name: reservations

          image: "{{ .Values.reservations.image.repository }}:{{ .Values.reservations.image.tag }}"

          imagePullPolicy: Always


          envFrom:

            - configMapRef:

                name: reservations-config


            - secretRef:

                name: reservations-secret


          ports:

            - containerPort: 3000